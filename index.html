<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>요즘 누가 음악을 듣나 - 이하소</title>
    <style>
        * { box-sizing: border-box; }
        body { 
            background: #000; color: #eee; font-family: sans-serif; margin: 0; 
            display: flex; flex-direction: column; align-items: center; 
            height: 100vh; height: -webkit-fill-available; overflow: hidden; 
        }
        h1 { margin: 15px 0 10px 0; font-size: 1.1rem; color: #f0db4f; text-align: center; }

        #game-box { 
            position: relative; width: 92%; max-width: 500px; height: 350px; 
            background-color: #222;
            background-image: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('cover.jpg');
            background-size: cover; background-position: center; 
            border: 2px solid #f0db4f; border-radius: 15px; overflow: hidden;
        }

        .word { 
            position: absolute; color: #fff; font-weight: bold; font-size: 1.1rem; 
            text-shadow: 2px 2px 4px rgba(0,0,0,1); padding: 6px 12px; 
            background: rgba(0,0,0,0.5); border-radius: 8px; white-space: nowrap; 
        }

        #ui-area { width: 100%; padding: 10px 0 40px 0; text-align: center; flex-grow: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        input { 
            width: 85%; max-width: 300px; padding: 14px; font-size: 1rem; border-radius: 25px; 
            border: 2px solid #f0db4f; background: #111; color: white; outline: none; 
            text-align: center; margin-bottom: 8px;
        }
        .score-info { font-size: 1rem; color: #f0db4f; font-weight: bold; margin-bottom: 5px; }
        audio { width: 90%; max-width: 400px; height: 40px; }

        #result-screen { 
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.95); z-index: 10; flex-direction: column; 
            align-items: center; justify-content: center; text-align: center; 
        }
        .btn { margin-top: 10px; padding: 12px 24px; background: #f0db4f; color: #000; border-radius: 25px; font-weight: bold; text-decoration: none; display: inline-block; border: none; }
    </style>
</head>
<body>

    <h1>🎵 요즘 누가 음악을 듣나 - 이하소</h1>
    
    <div id="game-box">
        <div id="result-screen">
            <h2 style="color:#f0db4f;">노래가 끝났습니다!</h2>
            <p id="final-score">점수: 0</p>
            <a href="https://www.youtube.com" target="_blank" class="btn">🎧 이하소 유튜브 구독하기</a>
            <button onclick="location.reload()" class="btn" style="background:#444; color:#fff; margin-top:10px;">다시 도전</button>
        </div>
    </div>

    <div id="ui-area">
        <div class="score-info">Score: <span id="score">0</span></div>
        <input type="text" id="input-word" placeholder="▶ 재생 버튼을 누르고 시작!">
        <audio id="music" src="song.mp3" controls></audio>
    </div>

    <script>
        const music = document.getElementById('music');
        const input = document.getElementById('input-word');
        const gameBox = document.getElementById('game-box');
        const scoreDisplay = document.getElementById('score');
        const resultScreen = document.getElementById('result-screen');

        // 초반 30초 구간 가사 간격을 더 여유 있게 조정했습니다.
        const lyrics = [
            {time: 1.5, text: "요즘"}, {time: 2.5, text: "누가"}, {time: 3.5, text: "음악을"}, {time: 4.5, text: "듣나"},
            {time: 7.0, text: "나도"}, {time: 8.5, text: "유튜브만"}, {time: 10.0, text: "보는데"},
            {time: 14.0, text: "세상엔"}, {time: 15.5, text: "너무"}, {time: 17.0, text: "재밌는"}, {time: 18.5, text: "게"}, {time: 20.0, text: "많고"},
            {time: 23.0, text: "음악을"}, {time: 24.5, text: "들을"}, {time: 26.0, text: "여유는"}, {time: 27.5, text: "없어"},
            {time: 31.0, text: "아무도"}, {time: 32.5, text: "들어주지"}, {time: 34.0, text: "않을"},
            {time: 37.0, text: "노랠"}, {time: 38.5, text: "오늘도"}, {time: 40.0, text: "곱씹으며"},
            {time: 44.0, text: "세상에"}, {time: 45.0, text: "던져질"}, {time: 46.0, text: "내"}, {time: 47.5, text: "모래알을"},
            {time: 50.0, text: "이리저리"}, {time: 52.0, text: "다듬어보네"},
            {time: 55.0, text: "요즘"}, {time: 56.0, text: "누가"}, {time: 57.0, text: "음악을"}, {time: 58.0, text: "듣나"},
            {time: 61.0, text: "나도"}, {time: 62.0, text: "잘"}, {time: 63.0, text: "안"}, {time: 64.0, text: "듣는데"},
            {time: 68.0, text: "세상엔"}, {time: 69.5, text: "누가"}, {time: 71.0, text: "음악을"}, {time: 72.5, text: "사고"}, {time: 74.0, text: "팔까"},
            {time: 77.0, text: "서랍"}, {time: 78.5, text: "속에"}, {time: 80.0, text: "내"}, {time: 81.5, text: "노래도"}, {time: 83.0, text: "사줘"},
            {time: 85.0, text: "제발"},
            {time: 89.0, text: "요즘"}, {time: 90.0, text: "누가"}, {time: 91.0, text: "음악을"}, {time: 92.0, text: "듣나"},
            {time: 95.0, text: "나도"}, {time: 96.5, text: "유튜브만"}, {time: 98.0, text: "보는데"}, 
            {time: 101.0, text: "세상엔"}, {time: 102.5, text: "너무"}, {time: 104.0, text: "재밌는"}, {time: 105.5, text: "게"}, {time: 107.0, text: "많고"},
            {time: 110.0, text: "음악을"}, {time: 111.5, text: "들을"}, {time: 113.0, text: "여유는"}, {time: 114.5, text: "없어"},
            {time: 118.0, text: "아무도"}, {time: 119.5, text: "들어주지"}, {time: 121.0, text: "않을"},
            {time: 124.0, text: "노랠"}, {time: 126.0, text: "오늘도"}, {time: 128.0, text: "곱씹으며"},
            {time: 132.0, text: "세상에"}, {time: 133.5, text: "던져질"}, {time: 135.0, text: "내"}, {time: 136.5, text: "모래알을"},
            {time: 139.5, text: "이리저리"}, {time: 142.0, text: "다듬어보네"},
            {time: 145.0, text: "제발"}, {time: 146.5, text: "내"}, {time: 148.0, text: "노래도"}, {time: 150.0, text: "사줘"},
            {time: 153.0, text: "제발"}, {time: 156.0, text: "제발"}, {time: 159.0, text: "제발"}, {time: 164.0, text: "에이씨"}
        ];

        let score = 0; let activeWords = []; let idx = 0;
        music.onplay = () => { input.focus(); update(); };
        music.onended = () => { resultScreen.style.display = 'flex'; document.getElementById('final-score').innerText = "최종 점수: " + score; };

        function update() {
            const now = music.currentTime;
            if (idx < lyrics.length && now >= lyrics[idx].time) { spawn(lyrics[idx].text); idx++; }
            activeWords.forEach((obj, i) => {
                obj.y += 0.8; // 낙하 속도를 1.2에서 0.8로 낮춰 훨씬 여유롭게 설정
                obj.el.style.top = obj.y + 'px';
                if (obj.y > gameBox.offsetHeight - 45) { gameBox.removeChild(obj.el); activeWords.splice(i, 1); }
            });
            if (!music.paused) requestAnimationFrame(update);
        }

        function spawn(txt) {
            const el = document.createElement('div');
            el.className = 'word'; el.innerText = txt;
            el.style.left = Math.random() * (gameBox.offsetWidth - 110) + 'px';
            el.style.top = '0px'; gameBox.appendChild(el);
            activeWords.push({ el, text: txt, y: 0 });
        }

        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                const val = input.value.trim();
                const targetIdx = activeWords.findIndex(w => w.text === val);
                if (targetIdx > -1) { gameBox.removeChild(activeWords[targetIdx].el); activeWords.splice(targetIdx, 1); score += 10; scoreDisplay.innerText = score; }
                input.value = '';
            }
        });
    </script>
</body>
</html>
