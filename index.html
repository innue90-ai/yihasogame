<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>요즘 누가 음악을 듣나 - 이하소</title>
    <style>
        * { box-sizing: border-box; }
        body { 
            background: #000; color: #eee; font-family: sans-serif; margin: 0; 
            display: flex; flex-direction: column; align-items: center; 
            height: 100vh; height: -webkit-fill-available; overflow: hidden; 
        }
        h1 { margin: 15px 0 10px 0; font-size: 1.1rem; color: #f0db4f; text-align: center; }

        /* 게임 박스: 모바일에서 가독성을 위해 높이 고정 */
        #game-box { 
            position: relative; width: 92%; max-width: 500px; height: 350px; 
            background-color: #222;
            background-image: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('cover.jpg');
            background-size: cover; background-position: center; 
            border: 2px solid #f0db4f; border-radius: 15px; overflow: hidden;
        }

        .word { 
            position: absolute; color: #fff; font-weight: bold; font-size: 1.1rem; 
            text-shadow: 2px 2px 4px rgba(0,0,0,1); padding: 6px 12px; 
            background: rgba(0,0,0,0.5); border-radius: 8px; white-space: nowrap; 
        }

        /* 하단 UI: 키보드와 재생 버튼 간섭 방지 */
        #ui-area { width: 100%; padding: 10px 0 40px 0; text-align: center; flex-grow: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        input { 
            width: 85%; max-width: 300px; padding: 14px; font-size: 1rem; border-radius: 25px; 
            border: 2px solid #f0db4f; background: #111; color: white; outline: none; 
            text-align: center; margin-bottom: 8px;
        }
        .score-info { font-size: 1rem; color: #f0db4f; font-weight: bold; margin-bottom: 5px; }
        audio { width: 90%; max-width: 400px; height: 40px; }

        #result-screen { 
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.95); z-index: 10; flex-direction: column; 
            align-items: center; justify-content: center; text-align: center; 
        }
        .btn { margin-top: 10px; padding: 12px 24px; background: #f0db4f; color: #000; border-radius: 25px; font-weight: bold; text-decoration: none; display: inline-block; border: none; }
    </style>
</head>
<body>

    <h1>🎵 요즘 누가 음악을 듣나 - 이하소</h1>
    
    <div id="game-box">
        <div id="result-screen">
            <h2 style="color:#f0db4f;">노래가 끝났습니다!</h2>
            <p id="final-score">점수: 0</p>
            <a href="https://www.youtube.com" target="_blank" class="btn">🎧 이하소 유튜브 구독하기</a>
            <button onclick="location.reload()" class="btn" style="background:#444; color:#fff; margin-top:10px;">다시 도전</button>
        </div>
    </div>

    <div id="ui-area">
        <div class="score-info">Score: <span id="score">0</span></div>
        <input type="text" id="input-word" placeholder="▶ 버튼 누르고 시작! (5초 뒤 등장)">
        <audio id="music" src="song.mp3" controls></audio>
    </div>

    <script>
        const music = document.getElementById('music');
        const input = document.getElementById('input-word');
        const gameBox = document.getElementById('game-box');
        const scoreDisplay = document.getElementById('score');
        const resultScreen = document.getElementById('result-screen');

        // 초반 여유를 위해 전체적으로 타이밍을 늦춘 가사 데이터
        const lyrics = [
            {time: 5.0, text: "요즘"}, {time: 5.6, text: "누가"}, {time: 6.2, text: "음악을"}, {time: 6.8, text: "듣나"},
            {time: 8.5, text: "나도"}, {time: 9.2, text: "유튜브만"}, {time: 10.0, text: "보는데"},
            {time: 13.0, text: "세상엔"}, {time: 13.8, text: "너무"}, {time: 14.5, text: "재밌는"}, {time: 15.2, text: "게"}, {time: 16.0, text: "많고"},
            {time: 18.0, text: "음악을"}, {time: 18.8, text: "들을"}, {time: 19.5, text: "여유는"}, {time: 20.2, text: "없어"},
            {time: 23.0, text: "아무도"}, {time: 23.8, text: "들어주지"}, {time: 24.5, text: "않을"},
            {time: 26.5, text: "노랠"}, {time: 27.2, text: "오늘도"}, {time: 28.0, text: "곱씹으며"},
            {time: 32.0, text: "세상에"}, {time: 32.8, text: "던져질"}, {time: 33.5, text: "내"}, {time: 34.5, text: "모래알을"},
            {time: 37.0, text: "이리저리"}, {time: 38.0, text: "다듬어보네"},
            {time: 40.0, text: "요즘"}, {time: 40.8, text: "누가"}, {time: 41.5, text: "음악을"}, {time: 42.2, text: "듣나"},
            {time: 45.0, text: "나도"}, {time: 45.8, text: "잘"}, {time: 46.5, text: "안"}, {time: 47.2, text: "듣는데"},
            {time: 50.0, text: "세상엔"}, {time: 51.0, text: "누가"}, {time: 51.8, text: "음악을"}, {time: 52.8, text: "사고"}, {time: 54.0, text: "팔까"},
            {time: 56.5, text: "서랍"}, {time: 57.2, text: "속에"}, {time: 58.0, text: "내"}, {time: 59.5, text: "노래도"}, {time: 60.5, text: "사줘"},
            {time: 63.0, text: "제발"},
            {time: 68.0, text: "요즘"}, {time: 68.8, text: "누가"}, {time: 69.5, text: "음악을"}, {time: 70.2, text: "듣나"},
            {time: 73.0, text: "나도"}, {time: 73.8, text: "유튜브만"}, {time: 74.5, text: "보는데"}, 
            {time: 77.0, text: "세상엔"}, {time: 77.8, text: "너무"}, {time: 78.5, text: "재밌는"}, {time: 80.0, text: "게"}, {time: 80.8, text: "많고"},
            {time: 83.0, text: "음악을"}, {time: 83.8, text: "들을"}, {time: 84.5, text: "여유는"}, {time: 85.2, text: "없어"},
            {time: 88.0, text: "아무도"}, {time: 88.8, text: "들어주지"}, {time: 89.5, text: "않을"},
            {time: 92.0, text: "노랠"}, {time: 93.5, text: "오늘도"}, {time: 94.2, text: "곱씹으며"},
            {time: 97.0, text: "세상에"}, {time: 98.0, text: "던져질"}, {time: 99.2, text: "내"}, {time: 100.0, text: "모래알을"},
            {time: 103.0, text: "이리저리"}, {time: 105.5, text: "다듬어보네"},
            {time: 108.0, text: "제발"}, {time: 109.0, text: "내"}, {time: 110.0, text: "노래도"}, {time: 112.5, text: "사줘"},
            {time: 116.0, text: "제발"}, {time: 119.0, text: "제발"}, {time: 122.0, text: "제발"}, {time: 128.0, text: "에이씨"}
        ];

        let score = 0; let activeWords = []; let idx = 0;
        music.onplay = () => { input.focus(); update(); };
        music.onended = () => { resultScreen.style.display = 'flex'; document.getElementById('final-score').innerText = "최종 점수: " + score; };

        function update() {
            const now = music.currentTime;
            if (idx < lyrics.length && now >= lyrics[idx].time) { spawn(lyrics[idx].text); idx++; }
            activeWords.forEach((obj, i) => {
                obj.y += 1.2; 
                obj.el.style.top = obj.y + 'px';
                if (obj.y > gameBox.offsetHeight - 45) { gameBox.removeChild(obj.el); activeWords.splice(i, 1); }
            });
            if (!music.paused) requestAnimationFrame(update);
        }

        function spawn(txt) {
            const el = document.createElement('div');
            el.className = 'word'; el.innerText = txt;
            el.style.left = Math.random() * (gameBox.offsetWidth - 110) + 'px';
            el.style.top = '0px'; gameBox.appendChild(el);
            activeWords.push({ el, text: txt, y: 0 });
        }

        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                const val = input.value.trim();
                const targetIdx = activeWords.findIndex(w => w.text === val);
                if (targetIdx > -1) { gameBox.removeChild(activeWords[targetIdx].el); activeWords.splice(targetIdx, 1); score += 10; scoreDisplay.innerText = score; }
                input.value = '';
            }
        });
    </script>
</body>
</html>
